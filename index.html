<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ewout's Optimum AI</title>
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="mobile-header">
        <div class="brand-container">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#fadf00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5" fill="#fadf00"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <div class="mobile-title">Optimum AI tool</div>
        </div>
        <button id="menu-toggle">☰ Menu</button>
    </div>

    <div id="sidebar">
        <div class="sidebar-header" style="display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box;">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#fadf00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 10px;">
                <circle cx="12" cy="12" r="5" fill="#fadf00"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <h2 id="sidebar-titel" style="margin: 0; display: flex; align-items: center; justify-content: center; width: 100%; position: relative;">
                <span style="flex: 1; text-align: center;">Optimum AI tool</span>
            </h2>
        </div>
        <button class="new-chat-btn" id="newChatBtn">+ Nieuw gesprek</button>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Zoek in chats...">
        </div>
        <div id="history-list"></div>
    </div>

    <div id="main-content">
        <div id="chat-window"></div>
        <div id="input-container">
            <div class="input-wrapper">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-wrap: wrap; gap: 10px;">
                    <select id="chatCategory" class="category-select">
                        <option value="Privé">🏠 Privé</option>
                        <option value="Werk & school">💼 Werk & school</option>
                    </select>
                    
                    <div class="ai-mode-selector">
                        <input type="radio" id="mode-claude" name="ai-workflow" value="single" checked>
                        <label for="mode-claude" class="ai-mode-label">
                            <img src="claude-logo.svg" class="mode-icon" alt="Claude"> Claude
                        </label>
                        <input type="radio" id="mode-dual" name="ai-workflow" value="dual">
                        <label for="mode-dual" class="ai-mode-label">
                            <img src="claude-logo.svg" class="mode-icon" alt="Claude"> + <img src="gemini-logo.svg" class="mode-icon" alt="Gemini"> Dual-AI
                        </label>
                        <div class="ai-mode-slider"></div>
                    </div>

                    <div id="attachmentPreview"></div>
                </div>

                <textarea id="userPrompt" rows="5" placeholder="Stel een vraag..."></textarea>
                
                <div id="optimizeContainer">
                    <button id="optimizeBtn">✨ Optimaliseer prompt</button>
                    <button id="undoOptimizeBtn">↩ Herstellen</button>
                </div>

                <div class="controls">
                    <input type="file" id="pdfAttachment" accept="application/pdf" style="display: none;" multiple>
                    <input type="file" id="imgAttachment" accept="image/png, image/jpeg, image/webp" style="display: none;" multiple>
                    <div id="attachMenuWrapper">
                        <button id="attachToggleBtn" title="Bestand toevoegen">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                        <div id="attachMenu">
                            <button id="addPdfBtn" class="attach-menu-btn">PDF toevoegen</button>
                            <button id="addImgBtn" class="attach-menu-btn">Foto toevoegen</button>
                        </div>
                    </div>
                    <button class="send-btn" id="sendBtn">Verstuur</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
