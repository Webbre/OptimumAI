<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ewout's Optimum AI</title>
    
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="OptimumAI" />
    <link rel="manifest" href="site.webmanifest" />
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="mobile-header">

            <div class="mobile-title">Optimum AI tool</div>
        </div>
        <button id="menu-toggle">☰ Menu</button>
    </div>

    <div id="sidebar">
        <div class="sidebar-header" style="display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box;">
            <svg style="width:64px; height:64px; margin-bottom: 5px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><style>.cls-1{fill:#fadf00;}.cls-2{fill:none;}.cls-3{fill:#ffc332;opacity:0.91;}.cls-4{fill:#fff;}</style></defs><g id="_1.sun" data-name="1.sun"><path class="cls-1" d="M32,17.71c-18.88.59-18.88,28,0,28.58C50.88,45.7,50.88,18.3,32,17.71Z"></path><path class="cls-2" d="M23.71,37c-.23-10.13,11-17.34,20.09-13C36.1,12.49,17.68,18,17.71,32a14.29,14.29,0,0,0,8.49,13A14.21,14.21,0,0,1,23.71,37Z"></path><path class="cls-3" d="M23.71,37a14.21,14.21,0,0,0,2.49,8C39.14,51,51.89,35.57,43.8,24,34.7,19.66,23.48,26.87,23.71,37Z"></path><path d="M32,19.71c16.24.52,16.23,24.06,0,24.58-16.24-.52-16.23-24.06,0-24.58m0-2c-18.88.59-18.88,28,0,28.58,18.88-.59,18.88-28,0-28.58Z"></path><path class="cls-4" d="M25,27.34a1,1,0,0,1-.78-1.63c.91-.93,3.34-3.82,4.54-2.17a1,1,0,0,1-.43,1.35C27,25.34,26.25,27,25,27.34Z"></path><path class="cls-4" d="M23.06,32c-1.64,0-1.14-3.32.38-3C24.73,29.22,24.27,32.08,23.06,32Z"></path><path d="M32,16.19a1,1,0,0,1-1-1v-5a1,1,0,1,1,2,0v5A1,1,0,0,1,32,16.19Z"></path><path d="M43.88,21.12a1,1,0,0,1-.7-.1.71c.91-.93,3.34-3.82,4.54-2.17A43.88,43.88,0,0,1,43.88,21.12Z"></path><path d="M53.85,33h-5a1,1,0,0,1,0-2h5A1,1,0,0,1,53.85,33Z"></path><path d="M47.45,48.45a1,1,0,0,1-.71-.29l-3.56-3.57c-.93-.9.51-2.35,1.41-1.41l3.57,3.56A1,1,0,0,1,47.45,48.45Z"></path><path d="M32,54.85a1,1,0,0,1-1-1v-5a1,1,0,0,1,2,0v5A1,1,0,0,1,32,54.85Z"></path><path d="M16.55,48.45a1,1,0,0,1-.71-1.71l3.57-3.56a1,1,0,0,1,1.41,1.41C20.37,44.88,17.15,48.67,16.55,48.45Z"></path><path d="M15.19,33h-5a1,1,0,0,1,0-2h5A1,1,0,0,1,15.19,33Z"></path><path d="M20.12,21.12a1,1,0,0,1-.71-.3l-3.57-3.56c-.93-.9.51-2.35,1.42-1.42l3.56,3.57A1,1,0,0,1,20.12,21.12Z"></path></g></svg>
            <h2 id="sidebar-titel" style="margin: 0; display: flex; align-items: center; justify-content: center; width: 100%; position: relative;">
                <span style="flex: 1; text-align: center;">Optimum AI tool</span>
            </h2>
        </div>

        <button class="new-chat-btn" id="newChatBtn">+ Nieuw gesprek</button>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Zoek in chats...">
        </div>
        <div id="history-list"></div>
    </div>

    <div id="main-content">
        <div id="chat-window"></div>
        <div id="input-container">
            <div class="input-wrapper">
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-wrap: wrap; gap: 5px;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <select id="chatCategory" class="category-select">
                            <option value="Privé">🏠 Privé</option>
                            <option value="Werk & school">💼 Werk & school</option>
                        </select>
                        
                        <div class="dual-ai-container">
                            <span>🧠 Dual-AI</span>
                            <label class="fancy-switch">
                                <input type="checkbox" id="workflowToggle">
                                <span class="fancy-slider"></span>
                            </label>
                        </div>
                    </div>
                    <div id="attachmentPreview"></div>
                </div>

                <textarea id="userPrompt" rows="5" placeholder="Stel een vraag... (Shift + Enter voor een nieuwe regel)"></textarea>
                
                <div id="optimizeContainer">
                    <button id="optimizeBtn">✨ Optimaliseer prompt</button>
                    <button id="undoOptimizeBtn">↩ Herstellen</button>
                </div>

                <div class="controls">
                    <input type="file" id="pdfAttachment" accept="application/pdf" style="display: none;" multiple>
                    <input type="file" id="imgAttachment" accept="image/png, image/jpeg, image/webp" style="display: none;" multiple>
                    
                    <div id="attachMenuWrapper">
                        <button id="attachToggleBtn" title="Bestand toevoegen">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>

                        <div id="attachMenu">
                            <button id="addPdfBtn" class="attach-menu-btn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                                PDF toevoegen
                            </button>
                            <button id="addImgBtn" class="attach-menu-btn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                                Foto toevoegen
                            </button>
                        </div>
                    </div>

                    <button class="send-btn" id="sendBtn">Verstuur</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal">
        <h3>Instellingen (Modellen)</h3>
        <label style="font-size:12px; font-weight:bold;">Gemini Model:</label>
        <select id="geminiModel">
            <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
            <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash-Lite</option>
            <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        </select>
        <label style="font-size:12px; font-weight:bold;">Claude Model:</label>
        <select id="claudeModel">
            <option value="claude-opus-4-8">Claude Opus 4.8</option>
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
            <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
        </select>
        <button id="saveSettingsBtn">Sluiten en opslaan</button>
    </div>

    <div id="auth-screen">
        <div class="auth-box">
            <svg style="width:72px; height:72px; margin-bottom:15px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><style>.cls-1{fill:#fadf00;}.cls-2{fill:none;}.cls-3{fill:#ffc332;opacity:0.91;}.cls-4{fill:#fff;}</style></defs><g id="_1.sun" data-name="1.sun"><path class="cls-1" d="M32,17.71c-18.88.59-18.88,28,0,28.58C50.88,45.7,50.88,18.3,32,17.71Z"></path><path class="cls-2" d="M23.71,37c-.23-10.13,11-17.34,20.09-13C36.1,12.49,17.68,18,17.71,32a14.29,14.29,0,0,0,8.49,13A14.21,14.21,0,0,1,23.71,37Z"></path><path class="cls-3" d="M23.71,37a14.21,14.21,0,0,0,2.49,8C39.14,51,51.89,35.57,43.8,24,34.7,19.66,23.48,26.87,23.71,37Z"></path><path d="M32,19.71c16.24.52,16.23,24.06,0,24.58-16.24-.52-16.23-24.06,0-24.58m0-2c-18.88.59-18.88,28,0,28.58,18.88-.59,18.88-28,0-28.58Z"></path><path class="cls-4" d="M25,27.34a1,1,0,0,1-.78-1.63c.91-.93,3.34-3.82,4.54-2.17a1,1,0,0,1-.43,1.35C27,25.34,26.25,27,25,27.34Z"></path><path class="cls-4" d="M23.06,32c-1.64,0-1.14-3.32.38-3C24.73,29.22,24.27,32.08,23.06,32Z"></path><path d="M32,16.19a1,1,0,0,1-1-1v-5a1,1,0,1,1,2,0v5A1,1,0,0,1,32,16.19Z"></path><path d="M43.88,21.12a1,1,0,0,1-.7-.1.71c.91-.93,3.34-3.82,4.54-2.17A43.88,43.88,0,0,1,43.88,21.12Z"></path><path d="M53.85,33h-5a1,1,0,0,1,0-2h5A1,1,0,0,1,53.85,33Z"></path><path d="M47.45,48.45a1,1,0,0,1-.71-.29l-3.56-3.57c-.93-.9.51-2.35,1.41-1.41l3.57,3.56A1,1,0,0,1,47.45,48.45Z"></path><path d="M32,54.85a1,1,0,0,1-1-1v-5a1,1,0,0,1,2,0v5A1,1,0,0,1,32,54.85Z"></path><path d="M16.55,48.45a1,1,0,0,1-.71-1.71l3.57-3.56a1,1,0,0,1,1.41,1.41C20.37,44.88,17.15,48.67,16.55,48.45Z"></path><path d="M15.19,33h-5a1,1,0,0,1,0-2h5A1,1,0,0,1,15.19,33Z"></path><path d="M20.12,21.12a1,1,0,0,1-.71-.3l-3.57-3.56c-.93-.9.51-2.35,1.42-1.42l3.56,3.57A1,1,0,0,1,20.12,21.12Z"></path></g></svg>
            <h2>Optimum AI tool</h2>
            <p>Log in om toegang te krijgen</p>
            <input type="email" id="authEmail" placeholder="E-mailadres">
            <input type="password" id="authPassword" placeholder="Wachtwoord">
            <button id="loginBtn">Inloggen</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>

</body>
</html>
