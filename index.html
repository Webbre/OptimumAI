<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ewout's Optimum AI</title>
    <link rel="icon" href="data:,">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="mobile-header">
        <div class="brand-container">
            <svg class="brand-logo" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="synGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4A148C"/><stop offset="100%" stop-color="#2094D0"/></linearGradient></defs>
                <path d="M 35 45 C 10 45, 10 15, 35 15 C 50 15, 55 25, 65 35 M 65 35 L 55 35 M 65 35 L 65 25" fill="none" stroke="url(#synGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 65 15 C 90 15, 90 45, 65 45 C 50 45, 45 35, 35 25 M 35 25 L 45 25 M 35 25 L 35 35" fill="none" stroke="url(#synGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="mobile-title">Optimum AI tool</div>
        </div>
        <button id="menu-toggle">☰ Menu</button>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <svg class="brand-logo" viewBox="0 0 100 60" xmlns="http://www.w3.org/2000/svg">
                <defs><linearGradient id="synGrad2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4A148C"/><stop offset="100%" stop-color="#2094D0"/></linearGradient></defs>
                <path d="M 35 45 C 10 45, 10 15, 35 15 C 50 15, 55 25, 65 35 M 65 35 L 55 35 M 65 35 L 65 25" fill="none" stroke="url(#synGrad2)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 65 15 C 90 15, 90 45, 65 45 C 50 45, 45 35, 35 25 M 35 25 L 45 25 M 35 25 L 35 35" fill="none" stroke="url(#synGrad2)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h2>Optimum AI tool</h2>
        </div>

        <button class="new-chat-btn" id="newChatBtn">+ Nieuw gesprek</button>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Zoek in chats...">
        </div>
        <div id="history-list"></div>
    </div>

    <div id="main-content">
        <div id="chat-window"></div>
        <div id="input-container">
            <div class="input-wrapper">
                <select id="chatCategory" class="category-select">
                    <option value="Privé">🏠 Privé</option>
                    <option value="Werk & school">💼 Werk & school</option>
                </select>
                <textarea id="userPrompt" rows="5" placeholder="Stel een vraag... (Shift + Enter voor een nieuwe regel)"></textarea>
                <div class="controls">
                    <span class="api-keys-link" id="settingsLink">Instellingen (API & modellen)</span>
                    <button class="send-btn" id="sendBtn">Verstuur</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal">
        <h3>Instellingen</h3>
        <label style="font-size:12px; font-weight:bold;">Gemini API Key:</label>
        <input type="password" id="geminiKey">
        <label style="font-size:12px; font-weight:bold;">Gemini Model:</label>
        <select id="geminiModel">
            <option value="gemini-3-pro">Gemini 3 Pro</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
            <option value="gemini-1.5-flash">Gemini 1.5 Flash</option>
        </select>
        <label style="font-size:12px; font-weight:bold;">Claude API Key:</label>
        <input type="password" id="claudeKey">
        <label style="font-size:12px; font-weight:bold;">Claude Model:</label>
        <select id="claudeModel">
            <option value="claude-opus-4-7">Claude Opus 4.7</option>
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
            <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
        </select>
        <button id="saveSettingsBtn">Sluiten en opslaan</button>
    </div>

    <script type="module" src="app.js"></script>

</body>
</html>
