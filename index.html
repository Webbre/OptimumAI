<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ewout's Optimum AI</title>
    
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="OptimumAI" />
    <link rel="manifest" href="site.webmanifest" />
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Extra specifieke stijlen voor de nieuwe AI logo's onder de welkomstekst */
        .welcome-brand-logos {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-top: 25px;
        }
        .ai-logo-svg {
            height: 28px;
            opacity: 0.4;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .ai-logo-svg:hover {
            opacity: 0.85;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div id="mobile-header">
        <div class="brand-container">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#fadf00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5" fill="#fadf00"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <div class="mobile-title">Optimum AI tool</div>
        </div>
        <button id="menu-toggle">☰ Menu</button>
    </div>

    <div id="sidebar">
        <div class="sidebar-header" style="display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box;">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#fadf00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 10px;">
                <circle cx="12" cy="12" r="5" fill="#fadf00"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <h2 id="sidebar-titel" style="margin: 0; display: flex; align-items: center; justify-content: center; width: 100%; position: relative;">
                <span style="flex: 1; text-align: center;">Optimum AI tool</span>
            </h2>
        </div>

        <button class="new-chat-btn" id="newChatBtn">+ Nieuw gesprek</button>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Zoek in chats...">
        </div>
        <div id="history-list"></div>
    </div>

    <div id="main-content">
        <div id="chat-window"></div>
        <div id="input-container">
            <div class="input-wrapper">
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; flex-wrap: wrap; gap: 5px;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <select id="chatCategory" class="category-select">
                            <option value="Privé">🏠 Privé</option>
                            <option value="Werk & school">💼 Werk & school</option>
                        </select>
                        
                        <div class="dual-ai-container">
                            <span>🧠 Dual-AI</span>
                            <label class="fancy-switch">
                                <input type="checkbox" id="workflowToggle">
                                <span class="fancy-slider"></span>
                            </label>
                        </div>
                    </div>
                    <div id="attachmentPreview"></div>
                </div>

                <textarea id="userPrompt" rows="5" placeholder="Stel een vraag... (Shift + Enter voor een nieuwe regel)"></textarea>
                
                <div id="optimizeContainer">
                    <button id="optimizeBtn">✨ Optimaliseer prompt</button>
                    <button id="undoOptimizeBtn">↩ Herstellen</button>
                </div>

                <div class="controls">
                    <input type="file" id="pdfAttachment" accept="application/pdf" style="display: none;" multiple>
                    <input type="file" id="imgAttachment" accept="image/png, image/jpeg, image/webp" style="display: none;" multiple>
                    
                    <div id="attachMenuWrapper">
                        <button id="attachToggleBtn" title="Bestand toevoegen">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>

                        <div id="attachMenu">
                            <button id="addPdfBtn" class="attach-menu-btn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                                PDF toevoegen
                            </button>
                            <button id="addImgBtn" class="attach-menu-btn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                                Foto toevoegen
                            </button>
                        </div>
                    </div>

                    <button class="send-btn" id="sendBtn">Verstuur</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-modal">
        <h3>Instellingen (Modellen)</h3>
        <label style="font-size:12px; font-weight:bold;">Gemini Model:</label>
        <select id="geminiModel">
            <option value="gemini-3.5-flash">Gemini 3.5 Flash</option>
            <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro</option>
            <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash-Lite</option>
            <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
        </select>
        <label style="font-size:12px; font-weight:bold;">Claude Model:</label>
        <select id="claudeModel">
            <option value="claude-opus-4-8">Claude Opus 4.8</option>
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
            <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
        </select>
        <button id="saveSettingsBtn">Sluiten en opslaan</button>
    </div>

    <div id="auth-screen">
        <div class="auth-box">
            <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#fadf00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:15px;">
                <circle cx="12" cy="12" r="5" fill="#fadf00"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <h2>Optimum AI tool</h2>
            <p>Log in om toegang te krijgen</p>
            <input type="email" id="authEmail" placeholder="E-mailadres">
            <input type="password" id="authPassword" placeholder="Wachtwoord">
            <button id="loginBtn">Inloggen</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>

</body>
</html>
